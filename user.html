<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Auth | Hospital Copilot</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Animate.css -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      background-color: white;
      border: none;
      padding: 30px;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease-in-out;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .form-label {
      font-weight: 500;
    }

    .btn {
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .switch-link {
      cursor: pointer;
      color: #007bff;
    }

    .switch-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="card animate__animated animate__fadeInDown">
  <h3 class="text-center mb-3">User Registration</h3>

  <!-- Sign Up Form -->
  <form id="signupForm">
    <div class="mb-3">
      <label for="name" class="form-label">Full Name</label>
      <input type="text" class="form-control" id="name" required />
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" required />
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password (min 6 characters)</label>
      <input type="password" class="form-control" id="password" minlength="6" required />
    </div>
    <div class="mb-3">
      <label for="role" class="form-label">Select Role</label>
      <select class="form-select" id="role">
        <option value="Doctor">Doctor</option>
        <option value="Patient">Patient</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
    <p class="text-center mt-3 text-muted">
      Already have an account?
      <span class="switch-link" onclick="toggleForm()">Login Here</span>
    </p>
  </form>

  <!-- Login Form -->
  <form id="loginForm" style="display: none;">
    <h3 class="text-center mb-3">User Login</h3>
    <div class="mb-3">
      <label for="loginEmail" class="form-label">Email</label>
      <input type="email" class="form-control" id="loginEmail" required />
    </div>
    <div class="mb-3">
      <label for="loginPassword" class="form-label">Password</label>
      <input type="password" class="form-control" id="loginPassword" required />
    </div>
    <button type="submit" class="btn btn-success w-100">Login</button>
    <p class="text-center mt-3 text-muted">
      Don't have an account?
      <span class="switch-link" onclick="toggleForm()">Register Here</span>
    </p>
  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  function toggleForm() {
    const signup = document.getElementById("signupForm");
    const login = document.getElementById("loginForm");
    if (signup.style.display === "none") {
      signup.style.display = "block";
      login.style.display = "none";
    } else {
      signup.style.display = "none";
      login.style.display = "block";
    }
  }

  document.getElementById("signupForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;

    if (name && email && password.length >= 6) {
      alert(`✅ Registered!\nName: ${name}\nEmail: ${email}\nRole: ${role}`);
    } else {
      alert("❌ Please fill all fields correctly.");
    }
  });

  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    if (email && password) {
      alert("🔐 Login attempted!");
    } else {
      alert("❌ Please fill in all login fields.");
    }
  });
</script>

</body>
</html>
